<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>VoxelCraft</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="game"></canvas>
  </div>

  <!-- UI module (ui.js) builds HUD/menus under here at runtime. -->
  <div id="ui-root"></div>

  <!-- Boot / loading + click-to-play overlay -->
  <div id="boot-overlay">
    <div class="boot-card">
      <h1>VoxelCraft</h1>
      <p class="boot-status" id="boot-status">Generating world…</p>
      <div class="pause-actions" id="pause-actions" style="display:none">
        <button id="btn-resume">Resume</button>
        <button id="btn-save">Save World</button>
      </div>
      <div class="boot-controls" id="boot-controls" style="display:none">
        <p class="boot-hint">Click to play</p>
        <ul>
          <li><b>WASD</b> move · <b>Space</b> jump · <b>Shift</b> sneak · <b>Ctrl</b> sprint</li>
          <li><b>Mouse</b> look · <b>L-click</b> break · <b>R-click</b> place/use</li>
          <li><b>1–9 / wheel</b> select · <b>E</b> inventory · <b>F</b> fly (creative)</li>
          <li><b>G</b> toggle creative/survival · <b>F3</b> debug · <b>Esc</b> menu</li>
        </ul>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
